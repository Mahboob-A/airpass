# docker/develop/docker-compose.yml
services:
  backend:
    build:
      context: ../../
      dockerfile: docker/develop/Dockerfile
    container_name: p2p-share-backend-dev
    restart: always
    env_file:
      - ../../.env
    environment:
      - APP_ENV=development
    ports:
      - "8000:8000" # Expose internal API for direct local testing 
    volumes:
      - ../../backend:/app # Live reload code injection
    networks:
      - p2p-internal

  nginx:
    image: nginx:1.25-alpine
    container_name: p2p-share-nginx-dev
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../frontend:/usr/share/nginx/html:ro
      - ../../ssl/certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - p2p-internal

networks:
  p2p-internal:
    driver: bridge
