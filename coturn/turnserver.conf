# coturn/turnserver.conf
# TURN server configuration for P2P Share
# See deployment-doc.md for setup instructions

# Network
listening-port=3478
tls-listening-port=5349

# Authentication — use shared secret for time-limited credentials
# The backend generates temporary credentials using TURN_CREDENTIAL as the shared secret.
# Set TURN_CREDENTIAL in .env to match the static-auth-secret below.
use-auth-secret
static-auth-secret=${TURN_CREDENTIAL}
realm=airpass.mehboob.tech

# Logging
log-file=/var/log/turnserver.log
simple-log

# Security
no-multicast-peers
no-cli

# Relay ports range (open these in firewall)
min-port=49152
max-port=65535

# Fingerprint for STUN messages
fingerprint

# Verbose logging for debugging (disable in production for performance)
# verbose
